<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{padding:20px;background:#fff;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
button{margin-top:10px;padding:8px;width:100%}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

/* ПРОСТОЙ КАТАЛОГ БЕЗ ОШИБОК */

var products = [

{
name:"iPhone 17",
variants:[
{title:"256GB Black",price:59000,img:"https://picsum.photos/300?1"},
{title:"512GB Blue",price:80200,img:"https://picsum.photos/300?2"}
]
},

{
name:"iPhone 17 Pro",
variants:[
{title:"256GB Blue",price:94300,img:"https://picsum.photos/300?3"},
{title:"512GB White",price:105200,img:"https://picsum.photos/300?4"}
]
},

{
name:"AirPods Pro 2",
variants:[
{title:"White",price:14000,img:"https://picsum.photos/300?5"}
]
}

]

function render(){

var html=""

for(var i=0;i<products.length;i++){

var p = products[i]

html += "<div class='card'>"

html += "<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html += "<h3>"+p.name+"</h3>"

html += "<select onchange='change("+i+",this)'>"

for(var j=0;j<p.variants.length;j++){
html += "<option value='"+j+"'>"+p.variants[j].title+"</option>"
}

html += "</select>"

html += "<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"

html += "<button onclick='buy(\""+p.name+"\")'>Купить</button>"

html += "</div>"
}

document.getElementById("app").innerHTML = html
}

function change(i,el){
var v = products[i].variants[el.value]
document.getElementById("img"+i).src = v.img
document.getElementById("price"+i).innerText = v.price + " ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

render()

</script>

</body>
</html>
