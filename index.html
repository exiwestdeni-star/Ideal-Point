<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body {
    background:black;
    color:white;
    font-family:sans-serif;
}

.container {
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1 {
    color:yellow;
}

.card {
    background:#111;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.price {
    color:yellow;
    font-size:20px;
}

.old {
    text-decoration:line-through;
    color:gray;
}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:10px;
    background:yellow;
    color:black;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<h1>Ideal Point</h1>
</div>

<script>
fetch("products.json")
.then(res => res.json())
.then(data => {

    const container = document.querySelector(".container");
    container.innerHTML = "<h1>Ideal Point</h1>";

    data.forEach(p => {
        container.innerHTML += `
        <div class="card">
            <h3>${p.name}</h3>
            <div class="old">${p.oldPrice} ₽</div>
            <div class="price">${p.price} ₽</div>
            <a class="btn" href="https://t.me/iDeal_Point_Level">Написать в Telegram</a>
        </div>`;
    });

});
</script>

</body>
</html>
