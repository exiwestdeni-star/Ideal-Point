<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#fff;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #eee;
}

.search{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
width:200px;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}

.filter{
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
cursor:pointer;
white-space:nowrap;
}

.active{background:#000;color:#fff}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

img{
width:100%;
height:220px;
object-fit:contain;
}

.price{
font-weight:700;
margin-top:10px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#000;
color:#fff;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<input class="search" placeholder="Поиск..." oninput="search(this.value)">
</header>

<div class="filters">
<div class="filter active" onclick="setFilter('all',this)">Все</div>
<div class="filter" onclick="setFilter('iphone',this)">iPhone</div>
<div class="filter" onclick="setFilter('watch',this)">Watch</div>
<div class="filter" onclick="setFilter('ipad',this)">iPad</div>
<div class="filter" onclick="setFilter('mac',this)">Mac</div>
<div class="filter" onclick="setFilter('ps',this)">PS</div>
</div>

<div id="app" class="grid"></div>

<script>

var currentFilter="all"
var searchText=""

/* КАТАЛОГ */

var products=[

{cat:"iphone",name:"iPhone 17",variants:[
{title:"256GB Black",price:62900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"},
{title:"256GB Blue",price:62200,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-blue-select"}
]},

{cat:"iphone",name:"iPhone 17 Pro Max",variants:[
{title:"256GB Blue",price:102500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max-blue-select"},
{title:"512GB White",price:114500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max-natural-select"}
]},

{cat:"watch",name:"Apple Watch",variants:[
{title:"S11",price:25900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/watch-s10-black"},
{title:"Ultra",price:59300,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/watch-ultra"}
]},

{cat:"ipad",name:"iPad Pro",variants:[
{title:"256GB",price:96000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-pro-spaceblack"}
]},

{cat:"mac",name:"MacBook Pro",variants:[
{title:"M5",price:122500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-pro-spaceblack"}
]},

{cat:"ps",name:"PS5",variants:[
{title:"Slim",price:45200,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{title:"Pro",price:74500,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"}
]}

]

function render(){

var html=""

for(var i=0;i<products.length;i++){

var p=products[i]

if(currentFilter!="all" && p.cat!=currentFilter) continue
if(searchText && !p.name.toLowerCase().includes(searchText)) continue

html+="<div class='card'>"
html+="<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html+="<h3>"+p.name+"</h3>"

html+="<select onchange='change("+i+",this)'>"

for(var j=0;j<p.variants.length;j++){
html+="<option value='"+j+"'>"+p.variants[j].title+"</option>"
}

html+="</select>"

html+="<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"
html+="<button onclick='buy(\""+p.name+"\")'>Купить</button>"
html+="</div>"
}

document.getElementById("app").innerHTML=html
}

function change(i,el){
var v=products[i].variants[el.value]
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

function setFilter(cat,el){
currentFilter=cat
document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
render()
}

function search(val){
searchText=val.toLowerCase()
render()
}

render()

</script>

</body>
</html>
