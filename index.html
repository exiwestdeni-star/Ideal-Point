<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f5f5f7;
color:#111;
}

header{
text-align:center;
padding:40px 20px;
font-size:32px;
font-weight:700;
}

.sub{
text-align:center;
color:#777;
margin-top:-20px;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
gap:25px;
padding:30px;
max-width:1300px;
margin:auto;
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
border-radius:14px;
}

.title{
font-size:18px;
font-weight:600;
margin:12px 0;
}

.price{
font-size:22px;
font-weight:700;
margin:10px 0;
}

.phone{
text-align:center;
margin-top:-10px;
font-weight:600;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:black;
color:white;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<header>IDEAL POINT</header>
<div class="sub">Премиум техника • Быстрая доставка</div>
<div class="phone">+7 969 969 67 67</div>

<div class="grid">

<!-- iPhone 17 Pro -->
<div class="card">
<img src="https://i.ibb.co/2n7Jc4m/iphone17pro.jpg">
<div class="title">iPhone 17 Pro</div>
<div class="price">от 94 300 ₽</div>
<button>Купить</button>
</div>

<!-- iPhone 17 -->
<div class="card">
<img src="https://i.ibb.co/f4x2TqF/iphone17.jpg">
<div class="title">iPhone 17</div>
<div class="price">от 59 000 ₽</div>
<button>Купить</button>
</div>

<!-- iPhone 17e -->
<div class="card">
<img src="https://i.ibb.co/m4xjzqY/iphone17e.jpg">
<div class="title">iPhone 17e</div>
<div class="price">от 44 700 ₽</div>
<button>Купить</button>
</div>

<!-- AirPods Pro -->
<div class="card">
<img src="https://i.ibb.co/zQw0pL0/airpodspro.jpg">
<div class="title">AirPods Pro 2</div>
<div class="price">14 000 ₽</div>
<button>Купить</button>
</div>

<!-- AirPods -->
<div class="card">
<img src="https://i.ibb.co/7r6g2Y6/airpods.jpg">
<div class="title">AirPods 4</div>
<div class="price">8 800 ₽</div>
<button>Купить</button>
</div>

</div>

</body>
</html>
