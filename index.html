<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#fff;color:#111}

/* HEADER */
header{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid #eee;
z-index:100;
}

/* HERO */
.hero{
height:90vh;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
text-align:center;
background:#f5f5f7;
margin-top:60px;
opacity:0;transform:translateY(40px);
transition:1s;
}
.hero.show{opacity:1;transform:translateY(0)}

.hero h1{font-size:48px;margin:0}
.hero p{color:#666}

/* FILTER */
.filters{
display:flex;gap:10px;
padding:15px;
overflow:auto;
}
.filter{
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
cursor:pointer;
white-space:nowrap;
}
.active{background:#000;color:#fff}

/* SEARCH */
.search{
margin:0 15px;
padding:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:25px;
padding:30px;
max-width:1400px;
margin:auto;
}

/* CARD */
.card{
background:#fafafa;
border-radius:20px;
padding:20px;
transition:.4s;
opacity:0;
transform:translateY(40px);
}
.card.show{opacity:1;transform:translateY(0)}

.card:hover{
transform:scale(1.04);
background:#fff;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img{
width:100%;height:220px;
object-fit:contain;
}

.price{font-weight:700;margin-top:10px}

button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:12px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
right:0;top:0;
width:320px;height:100%;
background:#fff;
box-shadow:-10px 0 30px rgba(0,0,0,0.1);
padding:20px;
overflow:auto;
}
input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<input class="search" placeholder="Поиск..." oninput="search(this.value)">
<div onclick="toggleCart()" style="cursor:pointer">🛒</div>
</header>

<div class="hero" id="hero">
<h1>Apple техника</h1>
<p>Премиум устройства по лучшим ценам</p>
</div>

<div class="filters">
<div class="filter active" onclick="setFilter('all',this)">Все</div>
<div class="filter" onclick="setFilter('iphone',this)">iPhone</div>
<div class="filter" onclick="setFilter('watch',this)">Watch</div>
<div class="filter" onclick="setFilter('ipad',this)">iPad</div>
<div class="filter" onclick="setFilter('mac',this)">Mac</div>
<div class="filter" onclick="setFilter('other',this)">Другое</div>
</div>

<div id="app" class="grid"></div>
<div id="cart" class="cart" style="display:none"></div>

<script>

/* ================= ВСТАВЬ СЮДА ВЕСЬ ПРАЙС ================= */
const raw = `
ВСТАВЬ СЮДА СВОЙ ПРАЙС (КАК ТЫ КИДАЛ)
`;

/* ================= ПАРСЕР ================= */

function getCategory(name){
name=name.toLowerCase()
if(name.includes("iphone")) return "iphone"
if(name.includes("watch")) return "watch"
if(name.includes("ipad")) return "ipad"
if(name.includes("macbook")) return "mac"
return "other"
}

function parse(){
let lines=raw.split("\n").filter(l=>l.includes("—"))

let products={}

lines.forEach(l=>{
let parts=l.split("—")
if(parts.length<2) return

let name=parts[0].trim()
let price=parseInt(parts[1])

let model=name.split(" ").slice(0,3).join(" ")

if(!products[model]){
products[model]={
name:model,
cat:getCategory(model),
variants:[]
}
}

products[model].variants.push({
title:name,
price:price,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"
})

})

return Object.values(products)
}

let products=parse()
products.push({
name:"iPhone 17 Air",
cat:"iphone",
variants:[
{
title:"iPhone 17 Air 256GB Blue",
price:67000,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-blue-select"
},
{
title:"iPhone 17 Air 512GB Black",
price:80900,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"
}
]
})
/* ================= ЛОГИКА ================= */

let cart=[]
let filter="all"
let searchText=""

function render(){

let html=""

products.forEach((p,i)=>{

if(filter!="all" && p.cat!=filter) return
if(searchText && !p.name.toLowerCase().includes(searchText)) return

html+=`
<div class="card">
<img src="${p.variants[0].img}">
<h3>${p.name}</h3>
<select onchange="change(${i},this)">
${p.variants.map((v,ind)=>`<option value="${ind}">${v.title}</option>`).join("")}
</select>
<div id="price${i}" class="price">${p.variants[0].price} ₽</div>
<button onclick="addToCart('${p.name}',${p.variants[0].price})">Купить</button>
</div>
`
})

document.getElementById("app").innerHTML=html

setTimeout(()=>{
document.querySelectorAll(".card").forEach((c,i)=>{
setTimeout(()=>c.classList.add("show"), i*50)
})
},100)
}

function change(i,el){
let v=products[i].variants[el.value]
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function addToCart(name,price){
cart.push({name,price})
renderCart()
}

function renderCart(){

let html="<h3>Корзина</h3>"
let total=0

cart.forEach(i=>{
total+=i.price
html+=`<div>${i.name} — ${i.price} ₽</div>`
})

html+=`<h3>Итого: ${total} ₽</h3>`

html+=`
<input id="name" placeholder="Имя">
<input id="phone" placeholder="Телефон">
<button onclick="checkout()">Оформить</button>
`

document.getElementById("cart").innerHTML=html
}

function toggleCart(){
let c=document.getElementById("cart")
c.style.display = c.style.display=="none" ? "block" : "none"
}

function checkout(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(!name || !phone){
alert("Введите данные")
return
}

let text="Заказ:%0A"

cart.forEach(i=>{
text+=i.name+" — "+i.price+"₽%0A"
})

text+="%0AИмя: "+name
text+="%0AТелефон: "+phone

window.open("https://t.me/iDeal_Point_Level?text="+text)
}

function setFilter(cat,el){
filter=cat
document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"))
el.classList.add("active")
render()
}

function search(val){
searchText=val.toLowerCase()
render()
}

/* HERO АНИМАЦИЯ */
setTimeout(()=>{
document.getElementById("hero").classList.add("show")
},200)

render()

</script>

</body>
</html>
