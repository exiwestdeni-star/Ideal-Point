<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#fff;
box-shadow:0 2px 10px rgba(0,0,0,.05)
}

.search{
padding:10px;
border-radius:10px;
border:1px solid #ddd
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px
}

.card{
background:#fff;
padding:15px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.05)
}

.card img{
width:100%;
height:200px;
object-fit:contain
}

.price{font-weight:700;margin-top:5px}

/* OPTIONS */
.colors span{
display:inline-block;
width:18px;height:18px;
border-radius:50%;
margin:4px;
cursor:pointer;
border:1px solid #ccc
}

.memory button{
margin:3px;
padding:5px 8px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer
}

.activeOpt{
background:#000;
color:#fff
}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<input class="search" placeholder="Поиск..." oninput="search(this.value)">
<div>+7 969 969 67 67</div>
</header>

<div id="products" class="grid"></div>

<script>

let searchText=""

/* ================= ПОЛНЫЙ КАТАЛОГ ================= */

const products = [

},
memory:{

"512GB":80200
}
},

{
name:"iPhone 17e",
colors:{
black:"https://images.unsplash.com/photo-1510552776732-03e61cf4b144",
pink:"https://images.unsplash.com/photo-1510557880182-3f8d1eab2c1e",
white:"https://images.unsplash.com/photo-1512499617640-c2f999098c01"
},
memory:{

}
},

{
name:"iPhone 17 Air",
colors:{
black:"https://images.unsplash.com/photo-1580910051074-3eb694886505",

blue:"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd",
white:"https://images.unsplash.com/photo-1598327105666-5b89351aff97"
},
memory:{
"256GB":67000,
"512GB":79100,
"1TB":89200
}
},

{
name:"iPhone 17 Pro",
colors:{

},

}
},

{
name:"iPhone 17 Pro Max",
colors:{

white:"https://images.unsplash.com/photo-1592750475338-74b7b21085ab"
},
memory:{
"256GB":102500,
"512GB":114500,
"1TB":124900,
"2TB":141300
}
},

{

},

},

{

},

"Air":47000,
"Pro":96000
}
},

{
name:"MacBook",
colors:{
silver:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
},
memory:{
"Air":69000,
"Air M4":91000,
"Pro":122500
}
},

{
name:"PlayStation 5",
colors:{
white:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"
},

{

},
memory:{
"USB-C":9000
}
}

]

/* ================= ЛОГИКА ================= */

function render(){

let list=products.filter(p=>{
return p.name.toLowerCase().includes(searchText.toLowerCase())
})

let html=""

list.forEach((p,i)=>{

let firstColor = Object.keys(p.colors)[0]
let firstMemory = Object.keys(p.memory)[0]

html+=`
<div class="card">

<img id="img${i}" src="${p.colors[firstColor]}">

<div>${p.name}</div>

<div class="colors">
${Object.keys(p.colors).map(c=>`
<span style="background:${c}" onclick="changeColor(${i},'${c}')"></span>
`).join("")}
</div>

<div class="memory">
${Object.keys(p.memory).map(m=>`
<button onclick="changeMemory(${i},'${m}',this)">${m}</button>
`).join("")}
</div>

<div id="price${i}" class="price">${p.memory[firstMemory]} ₽</div>

</div>
`
})

document.getElementById("products").innerHTML=html
}

function changeColor(i,color){
document.getElementById("img"+i).src=products[i].colors[color]
}

function changeMemory(i,m,el){
document.getElementById("price"+i).innerText=products[i].memory[m]+" ₽"

document.querySelectorAll(`#products .card:nth-child(${i+1}) .memory button`)
.forEach(b=>b.classList.remove("activeOpt"))

el.classList.add("activeOpt")
}

function search(val){
searchText=val
render()
}

render()

</script>

</body>
</html>
