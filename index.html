<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{padding:15px;background:#fff;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
button{margin-top:10px;padding:10px;width:100%;background:#000;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<button onclick="loadMore()">Показать ещё</button>
</header>

<div id="app" class="grid"></div>

<script>

/* ПОЛНЫЙ ПРАЙС (СЖАТЫЙ И БЕЗ ЛАГОВ) */

var products = [

/* iPhone */
{n:"iPhone 17 Black 256GB",p:62900},
{n:"iPhone 17 Blue 256GB",p:62200},
{n:"iPhone 17 White 256GB",p:62900},
{n:"iPhone 17 Sage 256GB",p:62600},

{n:"iPhone 17 Pro Blue 256GB",p:94300},
{n:"iPhone 17 Pro White 256GB",p:94700},

{n:"iPhone 17 Pro Max Blue 256GB",p:103000},
{n:"iPhone 17 Pro Max White 256GB",p:104000},

/* Watch */
{n:"Apple Watch SE2",p:14400},
{n:"Apple Watch S11",p:25900},
{n:"Apple Watch Ultra 3",p:59300},

/* AirPods */
{n:"AirPods 4",p:8800},
{n:"AirPods Pro 2",p:14000},
{n:"AirPods Pro 3",p:17500},
{n:"AirPods Max",p:40000},

/* iPad */
{n:"iPad 11",p:28500},
{n:"iPad Air M4",p:47000},
{n:"iPad Pro M5",p:96000},

/* Mac */
{n:"MacBook Air M2",p:69000},
{n:"MacBook Air M4",p:91000},
{n:"MacBook Pro M5",p:122500},

/* PS */
{n:"PS5 Slim",p:45200},
{n:"PS5 Pro",p:74500}

]

var step = 12
var index = 0

function render(){

let html=""

for(let i=0;i<index;i++){

let p=products[i]

html+=`
<div class="card">
<img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select">
<h3>${p.n}</h3>
<div class="price">${p.p} ₽</div>
<button onclick="buy('${p.n}')">Купить</button>
</div>
`
}

document.getElementById("app").innerHTML=html
}

function loadMore(){
index += step
if(index > products.length) index = products.length
render()
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

/* старт */
loadMore()

</script>

</body>
</html>
