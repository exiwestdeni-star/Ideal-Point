<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}

header{
display:flex;
justify-content:space-between;
padding:20px 30px;
background:#fff;
position:sticky;top:0;z-index:10;
box-shadow:0 2px 10px rgba(0,0,0,.05)
}

.logo{font-weight:700;font-size:20px}

.categories{
display:flex;gap:10px;padding:15px;flex-wrap:wrap;justify-content:center
}

.cat{
padding:10px 16px;
background:#fff;
border-radius:20px;
cursor:pointer;
border:1px solid #eee
}

.cat.active{background:#000;color:#fff}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px;
max-width:1300px;
margin:auto
}

.card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
transition:.3s
}

.card:hover{transform:translateY(-6px)}

.card img{
width:100%;
height:200px;
object-fit:contain
}

.title{font-weight:600;margin:10px 0}
.price{font-size:20px;font-weight:700}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
cursor:pointer;
width:100%
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center
}

.modal-box{
background:#fff;
padding:25px;
border-radius:20px;
width:340px;
text-align:center
}

.colors span{
display:inline-block;
width:20px;height:20px;
border-radius:50%;
margin:5px;
border:1px solid #ccc;
cursor:pointer
}

.memory button{
margin:5px;
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer
}

</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div class="categories">
<div class="cat active" onclick="filter('all')">Все</div>
<div class="cat" onclick="filter('iphone')">iPhone</div>
<div class="cat" onclick="filter('watch')">Watch</div>
<div class="cat" onclick="filter('ipad')">iPad</div>
<div class="cat" onclick="filter('mac')">Mac</div>
<div class="cat" onclick="filter('ps')">PS</div>
<div class="cat" onclick="filter('access')">Аксессуары</div>
</div>

<div id="products" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box">
<img id="mImg" style="width:100%;height:160px;object-fit:contain">
<h3 id="mName"></h3>
<div id="mPrice"></div>

<div class="colors" id="colors"></div>
<div class="memory" id="memory"></div>

<button class="btn" onclick="buy()">Купить в Telegram</button>
</div>
</div>

<script>

let current=null
let selectedMemory=""

const products=[

// iPhone
{
cat:"iphone",
name:"iPhone 17 Pro Max",
price:102500,
images:[
"https://images.unsplash.com/photo-1580910051074-3eb694886505",
"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd"
],
colors:["black","white","blue"],
memory:["256GB","512GB","1TB","2TB"]
},

{
cat:"iphone",
name:"iPhone 17",
price:59000,
images:[
"https://images.unsplash.com/photo-1510552776732-03e61cf4b144",
"https://images.unsplash.com/photo-1512499617640-c2f999098c01"
],
colors:["black","blue","white"],
memory:["256GB","512GB"]
},

// Watch
{
cat:"watch",
name:"Apple Watch S11",
price:25900,
images:["https://images.unsplash.com/photo-1511732351155-1865efcb7b7c"],
colors:["black","silver"],
memory:["42mm","46mm"]
},

// iPad
{
cat:"ipad",
name:"iPad Pro",
price:96000,
images:["https://images.unsplash.com/photo-1587033411391-5d9e51cce126"],
colors:["black","silver"],
memory:["256GB","512GB","1TB"]
},

// Mac
{
cat:"mac",
name:"MacBook Air",
price:91000,
images:["https://images.unsplash.com/photo-1517336714731-489689fd1ca8"],
colors:["silver","midnight"],
memory:["256GB","512GB","1TB"]
},

// PS
{
cat:"ps",
name:"PS5 Pro",
price:74500,
images:["https://images.unsplash.com/photo-1606813907291-d86efa9b94db"],
colors:["white"],
memory:["2TB"]
},

// AirPods
{
cat:"access",
name:"AirPods Pro 2",
price:14000,
images:["https://images.unsplash.com/photo-1588156979435-379b9d802b0e"],
colors:["white"],
memory:["—"]
}

]

function render(list){
let html=""
list.forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.images[0]}">
<div class="title">${p.name}</div>
<div class="price">${p.price} ₽</div>
<button class="btn">Подробнее</button>
</div>`
})
document.getElementById("products").innerHTML=html
}

function filter(cat){
document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'))
event.target.classList.add('active')

if(cat==="all") render(products)
else render(products.filter(p=>p.cat===cat))
}

function openModal(i){
current=products[i]
selectedMemory=""

document.getElementById("modal").style.display="flex"
document.getElementById("mImg").src=current.images[0]
document.getElementById("mName").innerText=current.name
document.getElementById("mPrice").innerText=current.price+" ₽"

let c=""
current.colors.forEach((_,i)=>c+=`<span onclick="changeColor(${i})"></span>`)
document.getElementById("colors").innerHTML=c

let m=""
current.memory.forEach(x=>m+=`<button onclick="selectMemory('${x}')">${x}</button>`)
document.getElementById("memory").innerHTML=m
}

function changeColor(i){
document.getElementById("mImg").src=current.images[i]
}

function selectMemory(m){selectedMemory=m}

function buy(){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+current.name+" "+selectedMemory)
}

window.onclick=e=>{
if(e.target.id==="modal") document.getElementById("modal").style.display="none"
}

render(products)

</script>

</body>
</html>
