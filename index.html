<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body {
margin:0;
font-family:-apple-system,Arial;
background:#000;
color:#fff;
}

header {
background:#111;
padding:20px;
text-align:center;
font-size:28px;
color:#FFD700;
font-weight:bold;
}

.sub {
text-align:center;
color:#aaa;
margin-bottom:10px;
}

.controls {
display:flex;
gap:10px;
justify-content:center;
padding:15px;
flex-wrap:wrap;
}

input,select {
padding:10px;
border-radius:10px;
border:none;
}

.products {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
padding:20px;
}

.card {
background:#111;
border-radius:15px;
padding:15px;
text-align:center;
transition:0.3s;
box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.card:hover {
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,215,0,0.3);
}

.card img {
width:100%;
height:180px;
object-fit:contain;
}

.price {
color:#FFD700;
font-size:22px;
margin-top:5px;
}

.old {
text-decoration:line-through;
color:#666;
font-size:14px;
}

.stock {
color:#00ff88;
font-size:13px;
margin-top:5px;
}

.btn {
display:block;
margin-top:10px;
padding:10px;
background:#FFD700;
color:#000;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.topbar {
display:flex;
justify-content:space-between;
padding:10px 20px;
align-items:center;
}

.telegram {
background:#FFD700;
color:#000;
padding:6px 12px;
border-radius:8px;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<header>IDEAL POINT</header>
<div class="sub">Цены ниже рынка на 3000 ₽</div>

<div class="topbar">
<div>📦 В наличии всегда</div>
<a class="telegram" href="https://t.me/iDeal_Point_Level">Telegram</a>
</div>

<div class="controls">
<input id="search" placeholder="Поиск...">
<select id="category">
<option value="all">Все категории</option>
<option value="iphone">iPhone</option>
<option value="mac">Mac</option>
<option value="ipad">iPad</option>
<option value="airpods">AirPods</option>
<option value="ps">PlayStation</option>
</select>
</div>

<div id="products" class="products"></div>

<script>

let products = [

{ name:"iPhone 16 256GB", price:109900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro-max", category:"iphone"},
{ name:"iPhone 16 Pro 256GB", price:129900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-16-pro", category:"iphone"},
{ name:"iPhone 17 Pro Max", price:159900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max", category:"iphone"},

{ name:"MacBook Air M3", price:119900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air", category:"mac"},
{ name:"MacBook Pro M3", price:159900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-pro", category:"mac"},

{ name:"iPad Pro", price:109900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-pro", category:"ipad"},

{ name:"AirPods Pro 2", price:20900, img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/airpods-pro", category:"airpods"},

{ name:"PlayStation 5", price:64900, img:"https://upload.wikimedia.org/wikipedia/commons/0/0d/PlayStation_5.jpg", category:"ps"},
{ name:"DualSense", price:7900, img:"https://upload.wikimedia.org/wikipedia/commons/5/5f/PS5_DualSense_Controller.png", category:"ps"}

];

function dynamicPrice(price){
return price - Math.floor(Math.random()*1000 + 2000);
}

function render(list){
const container = document.getElementById("products");
container.innerHTML="";

list.forEach(item=>{
const finalPrice = dynamicPrice(item.price);

container.innerHTML += `
<div class="card">
<img src="${item.img}">
<h3>${item.name}</h3>
<div class="stock">В наличии</div>
<div class="old">${item.price} ₽</div>
<div class="price">${finalPrice} ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level?text=Хочу ${item.name}">Купить</a>
</div>
`;
});
}

render(products);

document.getElementById("search").oninput = e=>{
const val = e.target.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(val)));
};

document.getElementById("category").onchange = e=>{
const val = e.target.value;
if(val==="all") return render(products);
render(products.filter(p=>p.category===val));
};

</script>

</body>
</html>
