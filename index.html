<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#fff;
border-bottom:1px solid #eee;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:15px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

img{
width:100%;
height:200px;
object-fit:contain;
}

.price{font-weight:700;margin-top:10px}

select{
width:100%;
padding:10px;
margin-top:10px;
}

/* BUTTON */
.buy{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

const products = [

{
name:"iPhone 17",
variants:[
{title:"256GB Black",price:59000,img:"https://images.unsplash.com/photo-1510552776732-03e61cf4b144"},
{title:"512GB Blue",price:80200,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c01"}
]
},

{
name:"iPhone 17 Pro Max",
variants:[
{title:"256GB Blue",price:102500,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
{title:"512GB White",price:114500,img:"https://images.unsplash.com/photo-1592750475338-74b7b21085ab"}
]
},

{
name:"AirPods Pro 2",
variants:[
{title:"White",price:14000,img:"https://images.unsplash.com/photo-1588156979435-379b9d802b0e"}
]
}

]

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">

<img id="img${i}" src="${p.variants[0].img}">

<h3>${p.name}</h3>

<select onchange="change(${i},this)">
${p.variants.map(v=>`
<option value='${JSON.stringify(v)}'>${v.title}</option>
`).join("")}
</select>

<div id="price${i}" class="price">${p.variants[0].price} ₽</div>

<button class="buy" onclick="buy('${p.name}')">Купить</button>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function change(i,el){
let v=JSON.parse(el.value)
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

render()

</script>

</body>
</html>
