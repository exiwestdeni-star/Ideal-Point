<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Inter;background:#f5f6fa;}

.header {
display:flex;
justify-content:space-between;
padding:15px;
background:#fff;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card {
background:#fff;
padding:15px;
border-radius:12px;
}

.card img {
width:100%;
height:160px;
object-fit:contain;
}

.price {font-weight:600;}
</style>
</head>

<body>

<div class="header">
<div><b>Ideal Point</b></div>
<div>📞 +7 969 969 67 67</div>
</div>

<div id="products" class="grid"></div>

<script>

let products = [

{ name:"iPhone 17", price:59900, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg" },

{ name:"iPhone 17 Air", price:64000, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-plus-1.jpg" },

{ name:"iPhone 17 Pro", price:97800, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-1.jpg" },

{ name:"iPhone 17 Pro Max", price:126600, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-max-1.jpg" },

{ name:"MacBook Air", price:88000, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-macbook-air-15-2023-1.jpg" },

{ name:"iPad Pro", price:89200, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-ipad-pro-2022-1.jpg" },

{ name:"Apple Watch Ultra", price:56300, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-watch-ultra-2-1.jpg" },

{ name:"AirPods Pro 2", price:11000, img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-airpods-pro-2-1.jpg" },

{ name:"PS5", price:71500, img:"https://fdn2.gsmarena.com/vv/pics/sony/sony-playstation-5-1.jpg" }

];

function render(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">${p.price} ₽</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

render();

</script>

</body>
</html>
