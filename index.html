<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>
<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{padding:20px;background:#fff;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
select{width:100%;padding:8px;margin-top:8px}
button{margin-top:10px;padding:8px;width:100%}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

/* ВСТАВЛЯЕШЬ СЮДА СВОЙ ПРАЙС */
const raw = `
const raw = `
Sim+eSim 17 256GB Black — 62900
Sim+eSim 17 256GB Blue — 62200
AirPods Pro 2 — 14000
`;
`;

/* НЕ ТРОГАЙ НИЖЕ */

function parse(){
let lines = raw.split("\n").filter(l=>l.trim())
let products = {}

lines.forEach(line=>{
let name = line.split("—")[0]
let price = parseInt(line.split("—")[1])

let model = name.split(" ").slice(0,3).join(" ")

if(!products[model]) products[model] = []

products[model].push({
title:name,
price:price,
img:"https://picsum.photos/300?"+Math.random()
})
})

return Object.keys(products).map(k=>({
name:k,
variants:products[k]
}))
}

let products = parse()

function render(){
let html=""
for(let i=0;i<products.length;i++){
let p=products[i]

html+=`
<div class="card">
<img id="img${i}" src="${p.variants[0].img}">
<h3>${p.name}</h3>

<select onchange="change(${i},this)">
${p.variants.map((v,index)=>`<option value="${index}">${v.title}</option>`).join("")}
</select>

<div id="price${i}" class="price">${p.variants[0].price} ₽</div>

<button onclick="buy('${p.name}')">Купить</button>
</div>
`
}

document.getElementById("app").innerHTML=html
}

function change(i,el){
let v=products[i].variants[el.value]
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

render()

</script>

</body>
</html>
