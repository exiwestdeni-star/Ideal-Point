<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}
header{display:flex;justify-content:space-between;padding:15px 25px;background:#fff}
.logo{font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:15px;padding:15px;box-shadow:0 5px 20px rgba(0,0,0,.05)}
.card img{width:100%;height:180px;object-fit:contain}
.price{font-weight:700;margin-top:5px}
.controls{padding:10px 20px}
input{padding:10px;width:100%;border-radius:8px;border:1px solid #ddd}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-box{background:#fff;padding:20px;border-radius:15px;width:320px;text-align:center}

.colors span{display:inline-block;width:20px;height:20px;border-radius:50%;margin:5px;border:1px solid #ccc;cursor:pointer}
.memory button{margin:5px;padding:5px 10px}

.btn{display:block;margin-top:10px;padding:10px;background:#111;color:#fff;border-radius:8px;text-decoration:none}

.cart{position:fixed;bottom:20px;right:20px;background:#111;color:#fff;padding:12px;border-radius:50px}
</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div class="controls">
<input id="search" placeholder="Поиск...">
</div>

<div id="products" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-box">
<img id="mImg" style="width:100%;height:150px;object-fit:contain">
<h3 id="mName"></h3>
<div id="mPrice"></div>

<div class="colors" id="colors"></div>
<div class="memory" id="memory"></div>

<a id="buy" class="btn">Купить</a>
</div>
</div>

<div class="cart" onclick="checkout()">🛒</div>

<script>

let cart=[]
let current=null
let selectedMemory=""

const products=[

{
name:"iPhone 17 Pro",
price:97800,
colors:["black","blue","silver"],
images:[
"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd",
"https://images.unsplash.com/photo-1580910051074-3eb694886505",
"https://images.unsplash.com/photo-1605236453806-6ff36851218e"
],
memory:["256GB","512GB","1TB"]
},

{
name:"iPhone 17",
price:62900,
colors:["black","blue","white"],
images:[
"https://images.unsplash.com/photo-1510552776732-03e61cf4b144",
"https://images.unsplash.com/photo-1512499617640-c2f999098c01",
"https://images.unsplash.com/photo-1510552776732-03e61cf4b144"
],
memory:["256GB","512GB"]
},

{
name:"iPhone 17e",
price:48000,
colors:["black","white","pink"],
images:[
"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
"https://images.unsplash.com/photo-1510552776732-03e61cf4b144",
"https://images.unsplash.com/photo-1512499617640-c2f999098c01"
],
memory:["256GB","512GB"]
},

{
name:"AirPods Pro 2",
price:14000,
colors:["white"],
images:["https://images.unsplash.com/photo-1588156979435-379b9d802b0e"],
memory:["—"]
}

]

function render(){
let val=document.getElementById("search").value.toLowerCase()
let html=""

products.filter(p=>p.name.toLowerCase().includes(val)).forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.images[0]}">
<div>${p.name}</div>
<div class="price">${p.price-3000} ₽</div>
</div>`
})

document.getElementById("products").innerHTML=html
}

function openModal(i){
current=products[i]
selectedMemory=""

document.getElementById("modal").style.display="flex"
document.getElementById("mImg").src=current.images[0]
document.getElementById("mName").innerText=current.name
document.getElementById("mPrice").innerText=(current.price-3000)+" ₽"

let c=""
current.colors.forEach((_,i)=>c+=`<span onclick="changeColor(${i})"></span>`)
document.getElementById("colors").innerHTML=c

let m=""
current.memory.forEach(x=>m+=`<button onclick="selectMemory('${x}')">${x}</button>`)
document.getElementById("memory").innerHTML=m

document.getElementById("buy").onclick=add
}

function changeColor(i){
document.getElementById("mImg").src=current.images[i]
}

function selectMemory(m){selectedMemory=m}

function add(){
cart.push(current.name+" "+selectedMemory)
alert("Добавлено")
}

function checkout(){
let text="Хочу:\n"+cart.join("\n")
window.open("https://t.me/iDeal_Point_Level?text="+encodeURIComponent(text))
}

document.getElementById("modal").onclick=e=>{
if(e.target.id==="modal") e.currentTarget.style.display="none"
}

document.getElementById("search").oninput=render

render()

</script>

</body>
</html>
