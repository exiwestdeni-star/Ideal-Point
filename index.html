<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body {margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff;}
.container {max-width:1200px;margin:auto;padding:20px;}
.logo {font-size:26px;color:#FFD700;font-weight:600;}
.top {display:flex;justify-content:space-between;align-items:center;}
.contact a {background:#FFD700;color:#000;padding:10px;border-radius:8px;text-decoration:none;}

.filters {margin:20px 0;}
.filters button {
  margin:5px;
  padding:8px 15px;
  background:#111;
  color:#FFD700;
  border:1px solid #FFD700;
  border-radius:8px;
  cursor:pointer;
}

.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
.card {background:#111;padding:15px;border-radius:12px;}
.card img {width:100%;border-radius:8px;}
.price {color:#FFD700;}
.btn {display:block;margin-top:10px;background:#FFD700;color:#000;padding:10px;text-align:center;border-radius:8px;text-decoration:none;}
</style>
</head>

<body>

<div class="container">

<div class="top">
<div>
<div class="logo">Ideal Point</div>
<div style="color:#aaa;font-size:14px;">Гарантия • Быстрая доставка • Лучшие цены</div>
</div>
<div class="contact">
<a href="https://t.me/iDeal_Point_Level">Telegram</a>
</div>
</div>

<h2>🔥 Вся техника Apple и PlayStation</h2>

<div class="filters">
<button onclick="filter('all')">Все</button>
<button onclick="filter('iphone')">iPhone</button>
<button onclick="filter('watch')">Watch</button>
<button onclick="filter('airpods')">AirPods</button>
<button onclick="filter('ipad')">iPad</button>
<button onclick="filter('mac')">MacBook</button>
<button onclick="filter('accessories')">Аксессуары</button>
<button onclick="filter('ps')">PlayStation</button>
</div>

<div class="grid" id="products"></div>

</div>

<script>
const products = [];

// iPhone 16 / 17 (много вариаций)
["16","16 Pro","16 Pro Max","17","17 Pro","17 Pro Max"].forEach(model=>{
["256GB","512GB","1TB"].forEach(mem=>{
products.push({name:`iPhone ${model} ${mem}`,price:90000+Math.floor(Math.random()*40000),cat:"iphone"});
});
});

// Apple Watch
["SE","Series 9","Ultra 2"].forEach(w=>{
products.push({name:`Apple Watch ${w}`,price:20000+Math.floor(Math.random()*60000),cat:"watch"});
});

// AirPods
["AirPods 2","AirPods 3","AirPods Pro 2","AirPods Max"].forEach(a=>{
products.push({name:a,price:9000+Math.floor(Math.random()*50000),cat:"airpods"});
});

// iPad
["iPad 10","iPad Air","iPad Pro 11","iPad Pro 12.9"].forEach(i=>{
["64GB","256GB","512GB"].forEach(mem=>{
products.push({name:`${i} ${mem}`,price:40000+Math.floor(Math.random()*80000),cat:"ipad"});
});
});

// Mac
["MacBook Air M2","MacBook Air M3","MacBook Pro M3"].forEach(m=>{
["256GB","512GB","1TB"].forEach(mem=>{
products.push({name:`${m} ${mem}`,price:100000+Math.floor(Math.random()*100000),cat:"mac"});
});
});

// Accessories
["Apple Pencil 1","Apple Pencil 2","Magic Mouse","Magic Keyboard","Smart Keyboard"].forEach(a=>{
products.push({name:a,price:5000+Math.floor(Math.random()*15000),cat:"accessories"});
});

// PlayStation
["PlayStation 5","PlayStation 5 Slim","DualSense Controller","DualSense Edge"].forEach(p=>{
products.push({name:p,price:5000+Math.floor(Math.random()*60000),cat:"ps"});
});

function render(list){
let html="";
list.forEach(p=>{
html+=`
<div class="card ${p.cat}">
<img src="https://source.unsplash.com/300x200/?${p.name}">
<h3>${p.name}</h3>
<div class="price">${p.price} ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level?text=Хочу ${p.name}">Купить</a>
</div>
`;
});
document.getElementById("products").innerHTML=html;
}

function filter(cat){
if(cat==="all"){render(products);return;}
render(products.filter(p=>p.cat===cat));
}

render(products);
</script>

</body>
</html>
