<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body {margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff;}
.container {max-width:1200px;margin:auto;padding:20px;}
.logo {font-size:26px;color:#FFD700;}
.top {display:flex;justify-content:space-between;}
.contact a {background:#FFD700;color:#000;padding:10px;border-radius:8px;text-decoration:none;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px;}
.card {background:#111;padding:15px;border-radius:12px;}
.price {color:#FFD700;font-size:18px;}
.old {text-decoration:line-through;color:#888;}
.btn {display:block;margin-top:10px;background:#FFD700;color:#000;padding:10px;text-align:center;border-radius:8px;text-decoration:none;}
</style>
</head>

<body>

<div class="container">

<div class="top">
<div class="logo">Ideal Point</div>
<div class="contact">
<a href="https://t.me/iDeal_Point_Level">Telegram</a>
</div>
</div>

<h2>🔥 Цены ниже рынка на 3000 ₽</h2>

<div class="grid" id="products"></div>

</div>

<script>

const products = [
{name:"iPhone 16 256GB",price:99900},
{name:"iPhone 16 Pro 256GB",price:119900},
{name:"iPhone 17 Pro Max 256GB",price:149900},
{name:"AirPods Pro 2",price:20900},
{name:"MacBook Air M3",price:119900},
{name:"iPad Pro",price:109900},
{name:"PlayStation 5",price:64900}
];

function render(){
let html="";

products.forEach(p=>{
let newPrice = p.price - 3000;

html += `
<div class="card">
<h3>${p.name}</h3>
<div class="old">${p.price} ₽</div>
<div class="price">${newPrice} ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level?text=Хочу ${p.name}">Купить</a>
</div>
`;
});

document.getElementById("products").innerHTML = html;
}

render();

</script>

</body>
</html>
