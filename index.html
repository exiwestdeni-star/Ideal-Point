<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

header {
    background:#111;
    padding:20px;
    text-align:center;
    font-size:28px;
    color:#FFD700;
}

.controls {
    display:flex;
    gap:10px;
    padding:15px;
    flex-wrap:wrap;
}

input, select {
    padding:10px;
    border-radius:8px;
    border:none;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#111;
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
    border-radius:10px;
}

.price {
    color:#FFD700;
    font-size:20px;
}

.old {
    text-decoration:line-through;
    color:#888;
}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:10px;
    background:#FFD700;
    color:#000;
    border-radius:8px;
    text-decoration:none;
}
</style>
</head>

<body>

<header>IDEAL POINT</header>

<div class="controls">
    <input type="text" id="search" placeholder="Поиск...">
    
    <select id="category">
        <option value="all">Все категории</option>
        <option value="iphone">iPhone</option>
        <option value="mac">Mac</option>
        <option value="ipad">iPad</option>
        <option value="airpods">AirPods</option>
        <option value="ps">PlayStation</option>
    </select>
</div>

<div class="products" id="products"></div>

<script>
let allProducts = [];

function getImage(name){
    if(name.includes("iPhone")) return "https://source.unsplash.com/400x300/?iphone";
    if(name.includes("Mac")) return "https://source.unsplash.com/400x300/?macbook";
    if(name.includes("iPad")) return "https://source.unsplash.com/400x300/?ipad";
    if(name.includes("AirPods")) return "https://source.unsplash.com/400x300/?airpods";
    if(name.includes("PlayStation")) return "https://source.unsplash.com/400x300/?playstation";
    return "https://source.unsplash.com/400x300/?technology";
}

function render(products){
    const container = document.getElementById("products");
    container.innerHTML = "";

    products.forEach(item => {
        container.innerHTML += `
            <div class="card">
                <img src="${getImage(item.name)}">
                <h3>${item.name}</h3>
                <div class="old">${item.price + 3000} ₽</div>
                <div class="price">${item.price} ₽</div>
                <a class="btn" href="https://t.me/iDeal_Point_Level">Купить</a>
            </div>
        `;
    });
}

fetch("https://ideal-point.onrender.com/products")
.then(res => res.json())
.then(data => {
    allProducts = data;
    render(data);
});

document.getElementById("search").addEventListener("input", e=>{
    const value = e.target.value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(value));
    render(filtered);
});

document.getElementById("category").addEventListener("change", e=>{
    const value = e.target.value;

    if(value === "all"){
        render(allProducts);
    } else {
        const filtered = allProducts.filter(p => p.category === value);
        render(filtered);
    }
});
</script>

</body>
</html>
