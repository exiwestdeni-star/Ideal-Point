<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#000;
  color:#fff;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1 {
  color:#FFD700;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.buttons a {
  margin-left:10px;
  padding:10px 15px;
  background:#FFD700;
  color:#000;
  text-decoration:none;
  border-radius:8px;
  font-size:14px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  margin-top:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:12px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#FFD700;
  font-size:18px;
}

.old {
  text-decoration:line-through;
  color:#777;
  font-size:14px;
}

.stock {
  color:#00ff88;
  font-size:13px;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  background:#FFD700;
  color:#000;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="top">
  <h1>Ideal Point</h1>
  <div class="buttons">
    <a href="https://t.me/iDeal_Point_Level">Telegram</a>
  </div>
</div>

<p>Apple • PlayStation • Цены ниже рынка</p>

<div class="grid" id="products"></div>

</div>

<script>
fetch('/products.json')
.then(res => res.json())
.then(data => {
  const container = document.getElementById('products');

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="old">${p.oldPrice} ₽</div>
        <div class="price">${p.price} ₽</div>
        <div class="stock">В наличии: 2 шт</div>
        <a class="btn" href="https://t.me/iDeal_Point_Level">Написать в Telegram</a>
      </div>
    `;
  });
});
</script>

</body>
</html>
