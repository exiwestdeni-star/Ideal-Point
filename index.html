<!DOCTYPE html>
<html lang="ru">
<head> 
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#000;
    color:#fff;
}

header {
    background:#111;
    padding:20px;
    text-align:center;
    font-size:28px;
    color:#FFD700;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card {
    background:#111;
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    transform:scale(1.05);
}

.card img {
    width:100%;
}

.price {
    color:#FFD700;
    font-size:20px;
}

.btn {
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#FFD700;
    color:#000;
    border-radius:8px;
    text-decoration:none;
}
</style>
</head>

<body>

<header>IDEAL POINT</header>

<div class="products" id="products"></div>

<script>
fetch("https://ideal-point.onrender.com/products")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("products");

    data.forEach(item => {
        container.innerHTML += `
            <div class="card">
                <img src="https://via.placeholder.com/200">
                <h3>${item.name}</h3>
                <div class="price">${item.price} ₽</div>
                <a class="btn" href="https://t.me/iDeal_Point_Level">Купить</a>
            </div>
        `;
    });
});
</script>

</body>
</html>
