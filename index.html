<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:20px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}

.card{background:#fff;padding:15px;border-radius:12px}
img{width:100%;height:180px;object-fit:contain}

.price{font-weight:bold;margin-top:10px}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#000;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:#fff;
box-shadow:-5px 0 20px rgba(0,0,0,0.1);
padding:15px;
overflow:auto;
}

.cart-item{
border-bottom:1px solid #eee;
padding:10px 0;
}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div onclick="toggleCart()" style="cursor:pointer">🛒 Корзина</div>
</header>

<div id="app" class="grid"></div>

<div id="cart" class="cart" style="display:none"></div>

<script>

var cart=[]

var products=[

{
name:"iPhone 17",
variants:[
{title:"256GB Black",price:62900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"},
{title:"256GB Blue",price:62200,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-blue-select"}
]
},

{
name:"AirPods Pro 2",
variants:[
{title:"White",price:14000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/MQD83"}
]
}

]

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">

<img src="${p.variants[0].img}">

<h3>${p.name}</h3>

<button onclick="addToCart('${p.name}',${p.variants[0].price})">
Добавить в корзину
</button>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function addToCart(name,price){
cart.push({name,price})
renderCart()
}

function renderCart(){

let html="<h3>Корзина</h3>"
let total=0

cart.forEach(item=>{
total+=item.price
html+=`<div class="cart-item">${item.name} — ${item.price} ₽</div>`
})

html+=`<h3>Итого: ${total} ₽</h3>`
html+=`<button onclick="checkout()">Оформить заказ</button>`

document.getElementById("cart").innerHTML=html
}

function toggleCart(){
let c=document.getElementById("cart")
c.style.display = c.style.display=="none" ? "block" : "none"
}

function checkout(){

let text="Заказ:%0A"

cart.forEach(i=>{
text+=i.name+" — "+i.price+"₽%0A"
})

window.open("https://t.me/iDeal_Point_Level?text="+text)
}

render()

</script>

</body>
</html>
