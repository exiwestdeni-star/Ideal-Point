<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:15px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
button{margin-top:10px;padding:10px;width:100%;background:#000;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div onclick="toggleCart()">🛒</div>
</header>

<div id="app" class="grid"></div>

<script>

let cart=[]

fetch('products.json')
.then(res=>res.json())
.then(products=>{

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">
<img src="${p.variants[0].img}">
<h3>${p.name}</h3>

<div class="price">${p.variants[0].price} ₽</div>

<button onclick="addToCart('${p.name}',${p.variants[0].price})">
Купить
</button>
</div>
`
})

document.getElementById("app").innerHTML=html
}

window.addToCart=function(name,price){
cart.push({name,price})
alert("Добавлено в корзину")
}

render()

})

</script>

</body>
</html>
