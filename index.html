<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:15px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:14px}
img{width:100%;height:200px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
select{width:100%;padding:8px;margin-top:8px}
button{margin-top:10px;padding:10px;width:100%;background:#000;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
</header>

<div id="app" class="grid"></div>

<script>

var products = [

/* iPhone */
{
name:"iPhone 17",
variants:[
{title:"Black",price:62900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select-202309"},
{title:"Blue",price:62200,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-blue-select-202309"},
{title:"Pink",price:62900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pink-select-202309"}
]
},

{
name:"iPhone 17 Pro",
variants:[
{title:"Blue Titanium",price:94300,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-blue-titanium-select-202309"},
{title:"Natural Titanium",price:94700,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-natural-titanium-select-202309"}
]
},

{
name:"iPhone 17 Pro Max",
variants:[
{title:"Blue Titanium",price:103000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max-blue-titanium-select-202309"},
{title:"Natural Titanium",price:127000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max-natural-titanium-select-202309"}
]
},

/* AirPods */
{
name:"AirPods",
variants:[
{title:"AirPods 4",price:8800,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/airpods-4-2024"},
{title:"AirPods Pro 2",price:14000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/MQD83"},
{title:"AirPods Max",price:40000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/airpods-max-select-202409"}
]
},

/* Mac */
{
name:"MacBook",
variants:[
{title:"Air Midnight",price:91000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-midnight-202306"},
{title:"Pro Space Black",price:122500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-pro-spaceblack-202310"}
]
},

/* iPad */
{
name:"iPad",
variants:[
{title:"iPad Air Blue",price:47000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-air-blue-202405"},
{title:"iPad Pro Space Black",price:96000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-pro-spaceblack-202405"}
]
},

/* Watch */
{
name:"Apple Watch",
variants:[
{title:"Series Black",price:25900,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/watch-s10-black-202409"},
{title:"Ultra",price:59300,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/watch-ultra-202309"}
]
}

]

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">

<img id="img${i}" src="${p.variants[0].img}">

<h3>${p.name}</h3>

<select onchange="change(${i},this)">
${p.variants.map((v,index)=>`<option value="${index}">${v.title}</option>`).join("")}
</select>

<div id="price${i}" class="price">${p.variants[0].price} ₽</div>

<button>Купить</button>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function change(i,el){
let v=products[i].variants[el.value]
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

render()

</script>

</body>
</html>
