<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-size:24px;
  font-weight:600;
  color:#FFD700;
}

.contact a {
  padding:10px 15px;
  background:#FFD700;
  color:#000;
  border-radius:8px;
  text-decoration:none;
}

.banner {
  margin:20px 0;
  padding:30px;
  background:linear-gradient(135deg,#111,#1a1a1a);
  border-radius:16px;
}

.banner h2 {
  color:#FFD700;
}

.filters {
  margin:20px 0;
}

.filters button {
  margin:5px;
  padding:8px 15px;
  background:#111;
  color:#FFD700;
  border:1px solid #FFD700;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.filters button:hover {
  background:#FFD700;
  color:#000;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:15px;
  border-radius:16px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  border-radius:10px;
}

.price {
  color:#FFD700;
  font-size:18px;
  margin-top:5px;
}

.old {
  text-decoration:line-through;
  color:#777;
  font-size:14px;
}

.btn {
  display:block;
  margin-top:10px;
  padding:10px;
  background:#FFD700;
  color:#000;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="top">
  <div class="logo">Ideal Point</div>
  <div class="contact">
    <a href="https://t.me/iDeal_Point_Level">Telegram</a>
  </div>
</div>

<div class="banner">
  <h2>iPhone 16 / 17 в наличии 🔥</h2>
  <p>Цены ниже рынка • Быстрая доставка • Гарантия</p>
</div>

<div class="filters">
  <button onclick="filter('all')">Все</button>
  <button onclick="filter('iphone')">iPhone</button>
  <button onclick="filter('airpods')">AirPods</button>
  <button onclick="filter('ipad')">iPad</button>
  <button onclick="filter('mac')">MacBook</button>
  <button onclick="filter('accessories')">Аксессуары</button>
  <button onclick="filter('ps')">PlayStation</button>
</div>

<div class="grid" id="products"></div>

</div>

<script>
let allProducts = [];

fetch("products.json")
.then(res => res.json())
.then(data => {
  allProducts = data;
  render(data);
});

function render(data){
  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="https://source.unsplash.com/400x300/?${p.name}">
        <h3>${p.name}</h3>
        <div class="old">${p.oldPrice} ₽</div>
        <div class="price">${p.price} ₽</div>
        <a class="btn" href="https://t.me/iDeal_Point_Level">Написать</a>
      </div>
    `;
  });
}

function filter(category){
  if(category === "all"){
    render(allProducts);
    return;
  }

  const filtered = allProducts.filter(p => p.category === category);
  render(filtered);
}
</script>

</body>
</html>
