<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{padding:20px;background:#fff;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.05)}
img{width:100%;height:200px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ddd}
button{margin-top:10px;padding:10px;width:100%;background:#000;color:#fff;border:none;border-radius:8px}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

var products = [

{

{title:"512GB White",price:114500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-max-natural-select-202309"}

},

{
name:"iPad",
variants:[
{title:"iPad 11",price:28500,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-10th-blue"},
{title:"Air M4",price:47000,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/ipad-air-blue"},

{title:"Pro",price:74500,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"}
]
}

]

function render(){

var html=""

for(var i=0;i<products.length;i++){

var p=products[i]

html+="<div class='card'>"

html+="<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html+="<h3>"+p.name+"</h3>"

html+="<select onchange='change("+i+",this)'>"

for(var j=0;j<p.variants.length;j++){
html+="<option value='"+j+"'>"+p.variants[j].title+"</option>"
}

html+="</select>"

html+="<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"

html+="<button onclick='buy(\""+p.name+"\")'>Купить</button>"

html+="</div>"
}

document.getElementById("app").innerHTML = html
}

function change(i,el){
var v = products[i].variants[el.value]
document.getElementById("img"+i).src = v.img
document.getElementById("price"+i).innerText = v.price + " ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

render()

</script>

</body>
