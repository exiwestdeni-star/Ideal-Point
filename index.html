<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body { background:#000; color:#fff; font-family:sans-serif; }
.container { max-width:1000px; margin:auto; padding:20px; }
h1 { color:#FFD700; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#111;
  padding:10px;
  border-radius:10px;
}

.price { color:#FFD700; }
.old { text-decoration:line-through; color:#777; }
</style>

</head>

<body>

<div class="container">
<h1>Ideal Point</h1>

<div class="grid" id="products"></div>

</div>

<script>
fetch('products.json')
.then(res => res.json())
.then(data => {
  const container = document.getElementById('products');

  data.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" width="100%">
        <h3>${p.name}</h3>
        <div class="old">${p.oldPrice} ₽</div>
        <div class="price">${p.price} ₽</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
