<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:20px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:20px}
.card{background:#fff;padding:15px;border-radius:15px}
.card img{width:100%;height:180px;object-fit:contain}
.price{font-weight:700}
</style>
</head>

<body>

<header>
<div>IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div id="products" class="grid"></div>

<script src="data.js"></script>
<script>

function render(){
let html=""
products.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<div>${p.name}</div>
<div class="price">${p.price} ₽</div>
</div>`
})
document.getElementById("products").innerHTML=html
}

render()

</script>

</body>
</html>
