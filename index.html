<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:20px;background:#fff}
.logo{font-weight:700}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:25px;padding:25px}
.card{background:#fff;padding:15px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,.05)}
.card img{width:100%;height:180px;object-fit:contain}
.price{font-weight:700}
.btn{margin-top:10px;padding:10px;background:#000;color:#fff;border:none;border-radius:10px;width:100%}
</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd">
<div>iPhone 17 Pro</div>
<div class="price">94 300 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1510552776732-03e61cf4b144">
<div>iPhone 17</div>
<div class="price">59 000 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div>iPhone 17e</div>
<div class="price">44 700 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div>MacBook</div>
<div class="price">86 000 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1587033411391-5d9e51cce126">
<div>iPad</div>
<div class="price">45 000 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1511732351155-1865efcb7b7c">
<div>Apple Watch</div>
<div class="price">25 900 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1588156979435-379b9d802b0e">
<div>AirPods Pro 2</div>
<div class="price">14 000 ₽</div>
<button class="btn">Купить</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf">
<div>PS5</div>
<div class="price">74 500 ₽</div>
<button class="btn">Купить</button>
</div>

</div>

</body>
</html>
