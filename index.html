<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
html {scroll-behavior:smooth;}

body {
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
}

/* HERO */
.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero img {
width:180px;
margin-bottom:20px;
}

.hero h1 {
font-size:48px;
font-weight:800;
}

.hero p {
color:#aaa;
margin-top:10px;
}

/* SECTION */
.section {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.section img {
width:300px;
margin:20px 0;
}

.title {
font-size:40px;
font-weight:700;
}

.price {
color:#FFD700;
font-size:26px;
margin-top:10px;
}

.btn {
margin-top:20px;
padding:12px 30px;
background:#FFD700;
color:#000;
border-radius:12px;
text-decoration:none;
font-weight:600;
}

/* FADE EFFECT */
.fade {
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show {
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<!-- 🔥 HERO -->
<section class="hero fade">
<img src="https://i.imgur.com/yourlogo.png">
<h1>IDEAL POINT</h1>
<p>Премиальная техника по лучшим ценам</p>
</section>

<!-- 📱 IPHONE -->
<section class="section fade">
<div class="title">iPhone 17 Pro Max</div>
<img src="https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd">
<div class="price">156 900 ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level">Купить</a>
</section>

<!-- 💻 MAC -->
<section class="section fade">
<div class="title">MacBook Air M3</div>
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="price">116 900 ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level">Купить</a>
</section>

<!-- 🎧 AIRPODS -->
<section class="section fade">
<div class="title">AirPods Pro 2</div>
<img src="https://images.unsplash.com/photo-1588156979435-379b9d802b0e">
<div class="price">17 900 ₽</div>
<a class="btn" href="https://t.me/iDeal_Point_Level">Купить</a>
</section>

<script>

// 🔥 анимация при скролле
const elements = document.querySelectorAll(".fade");

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

elements.forEach(el=>observer.observe(el));

</script>

</body>
</html>
