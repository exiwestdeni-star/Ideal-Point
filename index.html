<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(180deg,#f5f5f7,#ffffff);
color:#111;
}

/* HEADER */
.header {
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
}

.logo {font-weight:700;}

.nav a {
margin-left:20px;
text-decoration:none;
color:#111;
}

/* HERO */
.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1 {font-size:50px;}
.hero p {color:#666;}

.btn {
margin-top:20px;
padding:12px 30px;
background:#111;
color:#fff;
border-radius:10px;
text-decoration:none;
}

/* SECTION */
.section {
padding:120px 20px;
text-align:center;
}

.title {
font-size:32px;
margin-bottom:40px;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:25px;
}

.card {
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
transition:0.3s;
}

.card:hover {
transform:translateY(-5px);
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img {
width:100%;
height:180px;
object-fit:contain;
}

.price {
font-weight:700;
margin-top:5px;
}

.old {
text-decoration:line-through;
color:#999;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<div class="logo">Ideal Point</div>
<div class="nav">
<a href="#iphone">iPhone</a>
<a href="#mac">Mac</a>
<a href="#airpods">AirPods</a>
</div>
</div>

<section class="hero">
<h1>Ideal Point</h1>
<p>Премиальная техника по лучшим ценам</p>
<a class="btn" href="#iphone">Смотреть</a>
</section>

<section id="iphone" class="section">
<div class="title">iPhone</div>
<div id="iphone-list" class="grid"></div>
</section>

<section id="mac" class="section">
<div class="title">Mac</div>
<div id="mac-list" class="grid"></div>
</section>

<section id="airpods" class="section">
<div class="title">AirPods</div>
<div id="airpods-list" class="grid"></div>
</section>

<script>

let products = [

{ name:"iPhone 16 Pro", price:129900, img:"https://images.unsplash.com/photo-1695048133142-1a20484c3d35", cat:"iphone"},
{ name:"iPhone 17 Pro Max", price:159900, img:"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd", cat:"iphone"},

{ name:"MacBook Air M3", price:119900, img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8", cat:"mac"},

{ name:"AirPods Pro 2", price:20900, img:"https://images.unsplash.com/photo-1588156979435-379b9d802b0e", cat:"airpods"}

];

function price(p){ return p - 3000; }

function draw(cat){
return products
.filter(p=>p.cat===cat)
.map(p=>`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="old">${p.price} ₽</div>
<div class="price">${price(p.price)} ₽</div>
</div>
`).join("");
}

document.getElementById("iphone-list").innerHTML = draw("iphone");
document.getElementById("mac-list").innerHTML = draw("mac");
document.getElementById("airpods-list").innerHTML = draw("airpods");

</script>

</body>
</html>
