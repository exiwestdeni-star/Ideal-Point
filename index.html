<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
header{padding:20px;background:#fff;display:flex;justify-content:space-between}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:10px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
select{width:100%;padding:8px;margin-top:8px}
button{margin-top:10px;padding:8px;width:100%}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

var products = [

{
name:"iPhone 17",
variants:[
{title:"256GB Black",price:62900,img:"https://picsum.photos/300?1"},
{title:"256GB Blue",price:62200,img:"https://picsum.photos/300?2"},
{title:"256GB White",price:62900,img:"https://picsum.photos/300?3"},
{title:"512GB Black",price:80700,img:"https://picsum.photos/300?4"}
]
},

{
name:"iPhone 17 Pro",
variants:[
{title:"256GB Blue",price:94300,img:"https://picsum.photos/300?5"},
{title:"256GB White",price:94700,img:"https://picsum.photos/300?6"},
{title:"512GB Orange",price:105200,img:"https://picsum.photos/300?7"}
]
},

{
name:"iPhone 17 Pro Max",
variants:[
{title:"256GB Blue",price:103000,img:"https://picsum.photos/300?8"},
{title:"256GB White",price:104000,img:"https://picsum.photos/300?9"},
{title:"512GB Blue",price:119000,img:"https://picsum.photos/300?10"},
{title:"1TB Blue",price:129500,img:"https://picsum.photos/300?11"}
]
},

{
name:"Apple Watch",
variants:[
{title:"SE2",price:14400,img:"https://picsum.photos/300?12"},
{title:"S11",price:25900,img:"https://picsum.photos/300?13"},
{title:"Ultra 3",price:59300,img:"https://picsum.photos/300?14"}
]
},

{
name:"iPad",
variants:[
{title:"iPad 11 128GB",price:28500,img:"https://picsum.photos/300?15"},
{title:"iPad Air M4",price:47000,img:"https://picsum.photos/300?16"},
{title:"iPad Pro M5",price:96000,img:"https://picsum.photos/300?17"}
]
},

{
name:"MacBook",
variants:[
{title:"Air M2",price:69000,img:"https://picsum.photos/300?18"},
{title:"Air M4",price:91000,img:"https://picsum.photos/300?19"},
{title:"Pro M5",price:122500,img:"https://picsum.photos/300?20"}
]
},

{
name:"AirPods",
variants:[
{title:"AirPods 4",price:8800,img:"https://picsum.photos/300?21"},
{title:"Pro 2",price:14000,img:"https://picsum.photos/300?22"},
{title:"Max",price:40000,img:"https://picsum.photos/300?23"}
]
},

{
name:"PlayStation 5",
variants:[
{title:"Slim",price:45200,img:"https://picsum.photos/300?24"},
{title:"Pro",price:74500,img:"https://picsum.photos/300?25"}
]
}

]

function render(){

var html=""

for(var i=0;i<products.length;i++){

var p=products[i]

html+="<div class='card'>"

html+="<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html+="<h3>"+p.name+"</h3>"

html+="<select onchange='change("+i+",this)'>"

for(var j=0;j<p.variants.length;j++){
html+="<option value='"+j+"'>"+p.variants[j].title+"</option>"
}

html+="</select>"

html+="<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"

html+="<button onclick='buy(\""+p.name+"\")'>Купить</button>"

html+="</div>"
}

document.getElementById("app").innerHTML = html
}

function change(i,el){
var v = products[i].variants[el.value]
document.getElementById("img"+i).src = v.img
document.getElementById("price"+i).innerText = v.price + " ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

render()

</script>

</body>
</html>
