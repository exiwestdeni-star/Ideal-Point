<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f6fa;color:#111}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid #eee}
.logo{font-weight:700}
.banner{padding:40px 20px;text-align:center;background:#111;color:#fff}
.controls{display:flex;gap:10px;padding:12px 16px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #eee}
input,select{padding:10px;border-radius:8px;border:1px solid #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;padding:18px}
.card{background:#fff;border-radius:12px;padding:12px;cursor:pointer;box-shadow:0 5px 18px rgba(0,0,0,.05)}
.card img{width:100%;height:170px;object-fit:contain}
.price{font-weight:700;margin-top:6px}
.old{color:#999;text-decoration:line-through;font-size:13px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.modal-content{background:#fff;border-radius:12px;padding:16px;width:340px}
.colors span{display:inline-block;width:22px;height:22px;border-radius:50%;margin:4px;border:1px solid #ccc;cursor:pointer}
.memory button{margin:4px;padding:6px 10px;border-radius:6px;border:1px solid #ccc;cursor:pointer}
.btn{display:block;margin-top:12px;padding:10px;background:#111;color:#fff;border-radius:8px;text-align:center;text-decoration:none}
.cart{position:fixed;right:16px;bottom:16px;background:#111;color:#fff;border-radius:50px;padding:12px 16px;cursor:pointer}
</style>
</head>

    <option value="ipad">iPad</option>
    <option value="mac">Mac</option>
    <option value="airpods">AirPods</option>
    <option value="ps">PlayStation</option>
    <option value="access">Аксессуары</option>

<div id="products" class="grid"></div>

<div id="modal" class="modal">

    <img id="modalImg" style="width:100%;height:160px;object-fit:contain">
    <h3 id="modalName"></h3>
    <div id="modalPrice" class="price"></div>

    <div class="colors" id="colors"></div>
    <div class="memory" id="memory"></div>

    <a id="buyBtn" class="btn">Купить</a>

<div class="cart" onclick="checkout()">🛒</div>

let cart=[], current=null, selectedMemory="";

// 🔍 РЕНДЕР
function render(){
let val=document.getElementById("search").value.toLowerCase();
let cat=document.getElementById("category").value;

let html="";
products
.filter(p=>(cat==="all"||p.cat===cat) && p.name.toLowerCase().includes(val))
.forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.images[0]}">
<h3>${p.name}</h3>
<div class="price">${p.basePrice-3000} ₽</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

// 🪟 МОДАЛКА
function openModal(i){
current=products[i];
selectedMemory="";

document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=current.images[0];
document.getElementById("modalName").innerText=current.name;
document.getElementById("modalPrice").innerText=(current.basePrice-3000)+" ₽";

// цвета
let colorsHTML="";
current.colors.forEach((c,idx)=>{
colorsHTML+=`<span title="${c}" style="background:#ddd" onclick="changeColor(${idx})"></span>`;
});
document.getElementById("colors").innerHTML=colorsHTML;

// память
let memHTML="";
current.memory.forEach(m=>{
memHTML+=`<button onclick="selectMemory('${m}')">${m}</button>`;
});
document.getElementById("memory").innerHTML=memHTML;

// купить
document.getElementById("buyBtn").onclick=()=>addToCart();
}

function changeColor(i){
document.getElementById("modalImg").src=current.images[i];
}

function selectMemory(m){selectedMemory=m}

// 🛒
function addToCart(){
cart.push(current.name+" "+(selectedMemory||""));
alert("Добавлено");
}

function checkout(){
let text="Хочу заказать:\n"+cart.join("\n");
window.open("https://t.me/iDeal_Point_Level?text="+encodeURIComponent(text));
}

// закрытие
document.getElementById("modal").onclick=e=>{
if(e.target.id==="modal") e.currentTarget.style.display="none";
};

document.getElementById("search").oninput=render;
document.getElementById("category").onchange=render;

render();

</script>
