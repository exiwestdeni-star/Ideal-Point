<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f7}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px}
.card{background:#fff;padding:15px;border-radius:12px}
img{width:100%;height:180px;object-fit:contain}
.price{font-weight:bold;margin-top:10px}
select{width:100%;padding:8px;margin-top:8px}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<script>

/* 👉 СЮДА ВСТАВЛЯЕШЬ СВОЙ ПРАЙС */
const raw = `
Sim+eSim 17 256GB Black — 62900
Sim+eSim 17 256GB Blue — 62200
Sim+eSim 17 256GB White — 62900
AirPods Pro 2 — 14000
MacBook Air M4 16/256 — 80200
`;

/* НЕ ТРОГАЙ НИЖЕ */

function parse(){

let lines = raw.split("\n").filter(l=>l.includes("—"))

let products = {}

lines.forEach(l=>{

let parts = l.split("—")

let name = parts[0].trim()
let price = parseInt(parts[1])

let model = name.split(" ").slice(0,3).join(" ")

if(!products[model]){
products[model]={
name:model,
variants:[]
}
}

products[model].variants.push({
title:name,
price:price,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"
})

})

return Object.values(products)
}

let products = parse()

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">

<img src="${p.variants[0].img}">

<h3>${p.name}</h3>

<select onchange="change(${i},this)">
${p.variants.map((v,index)=>`<option value="${index}">${v.title}</option>`).join("")}
</select>

<div id="price${i}" class="price">${p.variants[0].price} ₽</div>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function change(i,el){
let v=products[i].variants[el.value]
document.getElementById("price"+i).innerText=v.price+" ₽"
}

render()

</script>

</body>
</html>
