<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7}
header{display:flex;justify-content:space-between;padding:20px;background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:16px;padding:15px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
img{width:100%;height:220px;object-fit:contain}
.price{font-weight:700;margin-top:10px}
select{width:100%;padding:8px;margin-top:8px}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div id="app" class="grid"></div>

<script>

/* ================= ПОЛНЫЙ КАТАЛОГ ================= */

]
},

/* ===== iPhone 17e ===== */
{

variants:[

{title:"Pink 256GB",price:45300,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pink-select"},

},

/* ===== iPhone 17 Air ===== */
{
name:"iPhone 17 Air",
variants:[
{title:"Black 256GB",price:67800,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-black-select"},
{title:"Gold 256GB",price:66300,img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-natural-select"},

]
}

]

/* ================= РЕНДЕР ================= */

function render(){

let html=""

products.forEach((p,i)=>{

html+=`
<div class="card">

<img id="img${i}" src="${p.variants[0].img}">

<h3>${p.name}</h3>

<select onchange="change(${i},this)">
${p.variants.map(v=>`
<option value='${JSON.stringify(v)}'>${v.title}</option>
`).join("")}
</select>

<div id="price${i}" class="price">${p.variants[0].price} ₽</div>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function change(i,el){
let v=JSON.parse(el.value)
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

render()

</script>

</body>
</html>
