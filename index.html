<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#fff;
color:#111;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
border-bottom:1px solid #eee;
z-index:100;
}

.logo{font-weight:700}

/* HERO */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#f5f5f7;
margin-top:60px;
}

.hero h1{
font-size:48px;
margin:0;
}

.hero p{
color:#666;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:30px;
padding:40px;
max-width:1400px;
margin:auto;
}

/* CARD */
.card{
border-radius:20px;
padding:20px;
background:#fafafa;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
background:#fff;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
}

.card h3{
margin:10px 0;
}

/* BUTTON */
button{
margin-top:10px;
padding:12px;
width:100%;
border-radius:12px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
font-weight:600;
}

/* CART */
.cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#fff;
box-shadow:-10px 0 30px rgba(0,0,0,0.1);
padding:20px;
overflow:auto;
}
</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div onclick="toggleCart()" style="cursor:pointer">🛒</div>
</header>

<div class="hero">
<h1>Техника Apple</h1>
<p>Премиум устройства по лучшим ценам</p>
</div>

<div id="app" class="grid"></div>

<div id="cart" class="cart" style="display:none"></div>

<script>

var cart=[]

var products=[

{
name:"iPhone 17",
price:62900,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-black-select"
},

{
name:"iPhone 17 Pro",
price:94300,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-15-pro-blue-select"
},

{
name:"MacBook Air",
price:91000,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/macbook-air-midnight"
},

{
name:"AirPods Pro",
price:14000,
img:"https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/MQD83"
}

]

function render(){

let html=""

products.forEach(p=>{

html+=`
<div class="card">

<img src="${p.img}">
<h3>${p.name}</h3>
<div>${p.price} ₽</div>

<button onclick="addToCart('${p.name}',${p.price}')">
Купить
</button>

</div>
`
})

document.getElementById("app").innerHTML=html
}

function addToCart(name,price){
cart.push({name,price})
renderCart()
}

function renderCart(){

let html="<h2>Корзина</h2>"
let total=0

cart.forEach(i=>{
total+=i.price
html+=`<div>${i.name} — ${i.price} ₽</div>`
})

html+=`<h3>Итого: ${total} ₽</h3>`

html+=`
<input id="name" placeholder="Ваше имя">
<input id="phone" placeholder="Ваш номер">

<button onclick="checkout()">Оформить</button>
`

document.getElementById("cart").innerHTML=html
}

function toggleCart(){
let c=document.getElementById("cart")
c.style.display = c.style.display=="none" ? "block" : "none"
}

function checkout(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(!name || !phone){
alert("Заполните данные")
return
}

let text="Заказ:%0A"

cart.forEach(i=>{
text+=i.name+" — "+i.price+"₽%0A"
})

text+="%0AИмя: "+name
text+="%0AТелефон: "+phone

window.open("https://t.me/iDeal_Point_Level?text="+text)
}

render()

</script>

</body>
</html>
