<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Inter;background:#f5f6fa;}

.header {
display:flex;
justify-content:space-between;
padding:15px 20px;
background:#fff;
position:sticky;
top:0;
}

.banner {
padding:50px;
text-align:center;
background:#000;
color:#fff;
}

.controls {
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

input,select {
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.grid {
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card {
background:#fff;
padding:15px;
border-radius:12px;
cursor:pointer;
}

.card img {
width:100%;
height:180px;
object-fit:contain;
}

.modal {
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-content {
background:#fff;
padding:20px;
border-radius:12px;
width:320px;
text-align:center;
}

.colors span {
display:inline-block;
width:22px;
height:22px;
border-radius:50%;
margin:5px;
cursor:pointer;
border:1px solid #ccc;
}

.memory button {
margin:5px;
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
cursor:pointer;
}

.btn {
display:block;
margin-top:15px;
padding:10px;
background:#111;
color:#fff;
border-radius:8px;
text-decoration:none;
}

.cart {
position:fixed;
bottom:20px;
right:20px;
background:#111;
color:#fff;
padding:12px 18px;
border-radius:50px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<div><b>Ideal Point</b></div>
<div>📞 +7 969 969 67 67</div>
</div>

<div class="banner">
<h1>Премиальная техника Apple</h1>
<p>Цены ниже рынка</p>
</div>

<div class="controls">
<input id="search" placeholder="Поиск...">
</div>

<div id="products" class="grid"></div>

<div id="modal" class="modal">
<div class="modal-content">
<img id="modalImg" style="width:100%;height:150px;object-fit:contain;">
<h3 id="modalName"></h3>
<div id="modalPrice"></div>

<div class="colors" id="colors"></div>
<div class="memory" id="memory"></div>

<a id="buyBtn" class="btn">Купить</a>
</div>
</div>

<div class="cart" onclick="checkout()">🛒</div>

<script>

let cart=[];

let products=[

{
name:"iPhone 17 Pro",
price:97800,
colors:["black","blue","silver"],
images:[
"https://images.unsplash.com/photo-1695048133142-1a20484c3d35",
"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd",
"https://images.unsplash.com/photo-1580910051074-3eb694886505"
],
memory:["256GB","512GB","1TB"]
},

{
name:"iPhone 17 Pro Max",
price:126600,
colors:["black","blue","silver"],
images:[
"https://images.unsplash.com/photo-1580910051074-3eb694886505",
"https://images.unsplash.com/photo-1605236453806-6ff36851218e",
"https://images.unsplash.com/photo-1598327105666-5b89351aff97"
],
memory:["256GB","512GB","1TB"]
},

{
name:"MacBook Air",
price:88000,
colors:["silver"],
images:["https://images.unsplash.com/photo-1517336714731-489689fd1ca8"],
memory:["512GB"]
}

];

let current=null;

function render(){
let val=document.getElementById("search").value.toLowerCase();

let html="";
products.filter(p=>p.name.toLowerCase().includes(val)).forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.images[0]}">
<h3>${p.name}</h3>
<div>${p.price} ₽</div>
</div>`;
});

document.getElementById("products").innerHTML=html;
}

function openModal(i){
current=products[i];
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=current.images[0];
document.getElementById("modalName").innerText=current.name;
document.getElementById("modalPrice").innerText=current.price+" ₽";

let colorsHTML="";
current.colors.forEach((c,index)=>{
colorsHTML+=`<span style="background:${c}" onclick="changeColor(${index})"></span>`;
});
document.getElementById("colors").innerHTML=colorsHTML;

let memoryHTML="";
current.memory.forEach(m=>{
memoryHTML+=`<button onclick="selectMemory('${m}')">${m}</button>`;
});
document.getElementById("memory").innerHTML=memoryHTML;

document.getElementById("buyBtn").onclick=()=>addToCart();
}

function changeColor(i){
document.getElementById("modalImg").src=current.images[i];
}

let selectedMemory="";

function selectMemory(m){
selectedMemory=m;
}

function addToCart(){
cart.push(current.name+" "+selectedMemory);
alert("Добавлено");
}

function checkout(){
let text="Хочу заказать:\n"+cart.join("\n");
window.open("https://t.me/iDeal_Point_Level?text="+encodeURIComponent(text));
}

document.getElementById("modal").onclick=function(e){
if(e.target.id==="modal") this.style.display="none";
}

render();

document.getElementById("search").oninput=render;

</script>

</body>
</html>
