<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}

/* HEADER */
header{
display:flex;
justify-content:space-between;
padding:20px;
background:#fff;
border-bottom:1px solid #eee;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
justify-content:center;
}

.filter{
padding:8px 14px;
border-radius:20px;
border:1px solid #ddd;
cursor:pointer;
background:#fff;
}

.active{background:#000;color:#fff}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#fff;
border-radius:16px;
padding:15px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
font-weight:700;
margin-top:10px;
}

select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#000;
color:#fff;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<b>IDEAL POINT</b>
<div>+7 969 969 67 67</div>
</header>

<div class="filters">
<div class="filter active" onclick="setFilter('all',this)">Все</div>
<div class="filter" onclick="setFilter('iphone',this)">iPhone</div>
<div class="filter" onclick="setFilter('watch',this)">Watch</div>
<div class="filter" onclick="setFilter('ipad',this)">iPad</div>
<div class="filter" onclick="setFilter('mac',this)">Mac</div>
<div class="filter" onclick="setFilter('ps',this)">PS</div>
</div>

<div id="app" class="grid"></div>

<script>

var currentFilter="all"

var products=[

/* iPhone */
{cat:"iphone",name:"iPhone 17",variants:[
{title:"256GB Black",price:59000,img:"https://picsum.photos/300?1"},
{title:"512GB Blue",price:80200,img:"https://picsum.photos/300?2"}
]},

{cat:"iphone",name:"iPhone 17 Pro",variants:[
{title:"256GB Blue",price:94300,img:"https://picsum.photos/300?3"},
{title:"512GB White",price:105200,img:"https://picsum.photos/300?4"}
]},

{cat:"iphone",name:"iPhone 17 Pro Max",variants:[
{title:"256GB Blue",price:102500,img:"https://picsum.photos/300?5"},
{title:"512GB White",price:114500,img:"https://picsum.photos/300?6"}
]},

/* Watch */
{cat:"watch",name:"Apple Watch",variants:[
{title:"SE",price:14300,img:"https://picsum.photos/300?7"},
{title:"S11",price:25900,img:"https://picsum.photos/300?8"}
]},

/* iPad */
{cat:"ipad",name:"iPad",variants:[
{title:"Air",price:47000,img:"https://picsum.photos/300?9"},
{title:"Pro",price:96000,img:"https://picsum.photos/300?10"}
]},

/* Mac */
{cat:"mac",name:"MacBook",variants:[
{title:"Air M4",price:91000,img:"https://picsum.photos/300?11"},
{title:"Pro",price:122500,img:"https://picsum.photos/300?12"}
]},

/* PS */
{cat:"ps",name:"PlayStation 5",variants:[
{title:"Slim",price:45200,img:"https://picsum.photos/300?13"},
{title:"Pro",price:74500,img:"https://picsum.photos/300?14"}
]}

]

function render(){

var html=""

for(var i=0;i<products.length;i++){

var p=products[i]

if(currentFilter!="all" && p.cat!=currentFilter) continue

html+="<div class='card'>"

html+="<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html+="<h3>"+p.name+"</h3>"

html+="<select onchange='change("+i+",this)'>"

for(var j=0;j<p.variants.length;j++){
html+="<option value='"+j+"'>"+p.variants[j].title+"</option>"
}

html+="</select>"

html+="<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"

html+="<button onclick='buy(\""+p.name+"\")'>Купить</button>"

html+="</div>"
}

document.getElementById("app").innerHTML=html
}

function change(i,el){
var v=products[i].variants[el.value]
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}

function setFilter(cat,el){
currentFilter=cat

var buttons=document.querySelectorAll(".filter")
for(var i=0;i<buttons.length;i++){
buttons[i].classList.remove("active")
}

el.classList.add("active")

render()
}

render()

</script>

</body>
</html>
