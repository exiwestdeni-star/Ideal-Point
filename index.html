function render(){
var html=""
for(var i=0;i<products.length;i++){
var p=products[i]

html+="<div class='card'>"
html+="<img id='img"+i+"' src='"+p.variants[0].img+"'>"
html+="<h3>"+p.name+"</h3>"

html+="<select onchange='change("+i+",this)'>"
for(var j=0;j<p.variants.length;j++){
html+="<option value='"+j+"'>"+p.variants[j].title+"</option>"
}
html+="</select>"

html+="<div id='price"+i+"' class='price'>"+p.variants[0].price+" ₽</div>"
html+="<button onclick='buy(\""+p.name+"\")'>Купить</button>"
html+="</div>"
}

document.getElementById("app").innerHTML=html
}

function change(i,el){
var v=products[i].variants[el.value]
document.getElementById("img"+i).src=v.img
document.getElementById("price"+i).innerText=v.price+" ₽"
}

function buy(name){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+name)
}
