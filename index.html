<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Inter;background:#f5f6fa;}
.header {display:flex;justify-content:space-between;padding:15px;background:#fff;}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px;}
.card {background:#fff;padding:15px;border-radius:12px;}
.card img {width:100%;height:160px;object-fit:contain;}
.price {font-weight:600;}
.old {text-decoration:line-through;color:#999;}
</style>
</head>

<body>

<div class="header">
<div>Ideal Point</div>
<div>📞 +7 969 969 67 67</div>
</div>

<div id="products" class="grid"></div>

<script>

let products = [
{name:"iPhone 17 256GB Black", price:59900},
{name:"iPhone 17 Pro 256GB Blue", price:97800},
{name:"iPhone 17 Pro Max 512GB", price:126600},
{name:"MacBook Air M4 16/512", price:88000},
{name:"AirPods Pro 2", price:11000},
{name:"PS5 Pro 2TB", price:71500}
];

function img(name){
if(name.includes("iPhone")) return "https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd";
if(name.includes("Mac")) return "https://images.unsplash.com/photo-1517336714731-489689fd1ca8";
if(name.includes("AirPods")) return "https://images.unsplash.com/photo-1588156979435-379b9d802b0e";
if(name.includes("PS5")) return "https://images.unsplash.com/photo-1606813907291-d86efa9b94db";
return "";
}

function render(){
let html="";
products.forEach(p=>{
html+=`
<div class="card">
<img src="${img(p.name)}">
<h3>${p.name}</h3>
<div class="price">${p.price} ₽</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

render();

</script>

</body>
</html>
