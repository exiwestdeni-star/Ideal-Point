<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}
header{display:flex;justify-content:space-between;padding:20px;background:#fff}
.logo{font-weight:700}

.categories{display:flex;gap:10px;padding:15px;flex-wrap:wrap}
.cat{padding:8px 14px;background:#fff;border-radius:20px;cursor:pointer;border:1px solid #eee}
.cat.active{background:#000;color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px}

.card{background:#fff;border-radius:15px;padding:15px;box-shadow:0 5px 20px rgba(0,0,0,.05)}
.card img{width:100%;height:180px;object-fit:contain}
.title{font-weight:600;margin:10px 0}
.price{font-weight:700}

</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div class="categories">
<div class="cat active" onclick="filter('all')">Все</div>
<div class="cat" onclick="filter('iphone')">iPhone</div>
<div class="cat" onclick="filter('watch')">Watch</div>
<div class="cat" onclick="filter('ipad')">iPad</div>
<div class="cat" onclick="filter('mac')">MacBook</div>
<div class="cat" onclick="filter('ps')">PS</div>
<div class="cat" onclick="filter('access')">Аксессуары</div>
</div>

<div id="products" class="grid"></div>

<script>

const products=[

// ================= IPHONE =================
{cat:"iphone",name:"iPhone 17 256GB",price:"от 59 000 ₽"},
{cat:"iphone",name:"iPhone 17 512GB",price:"от 80 200 ₽"},
{cat:"iphone",name:"iPhone 17e 256GB",price:"от 44 700 ₽"},
{cat:"iphone",name:"iPhone 17e 512GB",price:"от 64 000 ₽"},
{cat:"iphone",name:"iPhone 17 Air 256GB",price:"от 67 000 ₽"},
{cat:"iphone",name:"iPhone 17 Air 512GB",price:"от 79 100 ₽"},
{cat:"iphone",name:"iPhone 17 Air 1TB",price:"от 89 200 ₽"},
{cat:"iphone",name:"iPhone 17 Pro 256GB",price:"от 94 300 ₽"},
{cat:"iphone",name:"iPhone 17 Pro 512GB",price:"от 105 200 ₽"},
{cat:"iphone",name:"iPhone 17 Pro 1TB",price:"от 120 900 ₽"},
{cat:"iphone",name:"iPhone 17 Pro Max 256GB",price:"от 102 500 ₽"},
{cat:"iphone",name:"iPhone 17 Pro Max 512GB",price:"от 114 500 ₽"},
{cat:"iphone",name:"iPhone 17 Pro Max 1TB",price:"от 124 900 ₽"},
{cat:"iphone",name:"iPhone 17 Pro Max 2TB",price:"от 141 300 ₽"},

// ================= WATCH =================
{cat:"watch",name:"Apple Watch SE2",price:"от 14 300 ₽"},
{cat:"watch",name:"Apple Watch SE3",price:"от 19 000 ₽"},
{cat:"watch",name:"Apple Watch S10",price:"от 23 000 ₽"},
{cat:"watch",name:"Apple Watch S11",price:"от 25 900 ₽"},
{cat:"watch",name:"Apple Watch Ultra 2",price:"от 49 600 ₽"},
{cat:"watch",name:"Apple Watch Ultra 3",price:"от 57 000 ₽"},

// ================= IPAD =================
{cat:"ipad",name:"iPad 11",price:"от 28 500 ₽"},
{cat:"ipad",name:"iPad 9",price:"от 19 700 ₽"},
{cat:"ipad",name:"iPad Air 11",price:"от 45 000 ₽"},
{cat:"ipad",name:"iPad Air 13",price:"от 59 000 ₽"},
{cat:"ipad",name:"iPad Mini 7",price:"от 36 800 ₽"},
{cat:"ipad",name:"iPad Pro 11",price:"от 75 600 ₽"},
{cat:"ipad",name:"iPad Pro 13",price:"от 96 000 ₽"},

// ================= MAC =================
{cat:"mac",name:"MacBook Air 13",price:"от 69 000 ₽"},
{cat:"mac",name:"MacBook Air 15",price:"от 70 500 ₽"},
{cat:"mac",name:"MacBook Pro 14",price:"от 88 000 ₽"},
{cat:"mac",name:"MacBook Pro 16",price:"от 216 000 ₽"},

// ================= PS =================
{cat:"ps",name:"PS5 Pro",price:"74 500 ₽"},
{cat:"ps",name:"PS5 Slim",price:"45 200 ₽"},
{cat:"ps",name:"DualSense Controller",price:"5 300 ₽"},

// ================= ACCESS =================
{cat:"access",name:"AirPods 4",price:"8 800 ₽"},
{cat:"access",name:"AirPods Pro 2",price:"14 000 ₽"},
{cat:"access",name:"AirPods Pro 3",price:"17 500 ₽"},
{cat:"access",name:"AirPods Max",price:"40 000 ₽"},
{cat:"access",name:"Apple Pencil",price:"7 900 ₽"},
{cat:"access",name:"Magic Mouse",price:"8 000 ₽"}

]

function render(list){
let html=""
list.forEach(p=>{
html+=`
<div class="card">
<img src="https://via.placeholder.com/300x200?text=Ideal+Point">
<div class="title">${p.name}</div>
<div class="price">${p.price}</div>
</div>`
})
document.getElementById("products").innerHTML=html
}

function filter(cat){
document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'))
event.target.classList.add('active')

if(cat==="all") render(products)
else render(products.filter(p=>p.cat===cat))
}

render(products)

</script>

</body>
</html>
