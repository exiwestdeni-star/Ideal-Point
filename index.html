<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideal Point</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#f5f5f7;color:#111}

header{
display:flex;
justify-content:space-between;
padding:20px 30px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.05)
}

.logo{font-size:20px;font-weight:700}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:30px;
max-width:1300px;
margin:auto
}

.card{
background:white;
border-radius:18px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
transition:.3s
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:200px;
object-fit:contain
}

.title{font-weight:600;margin:10px 0}
.price{font-weight:700;font-size:18px}

.btn{
margin-top:10px;
padding:10px;
background:black;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
width:100%
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center
}

.modal-box{
background:white;
padding:20px;
border-radius:15px;
width:320px;
text-align:center
}
</style>
</head>

<body>

<header>
<div class="logo">IDEAL POINT</div>
<div>+7 969 969 67 67</div>
</header>

<div class="grid" id="products"></div>

<div class="modal" id="modal">
<div class="modal-box">
<img id="mImg" style="width:100%;height:160px;object-fit:contain">
<h3 id="mName"></h3>
<p id="mPrice"></p>
<button class="btn" onclick="buy()">Купить</button>
</div>
</div>

<script>

let current=""

const products=[

{
name:"iPhone 17 Pro",
price:"94 300 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-pro-max-black"
},

{
name:"iPhone 17",
price:"59 000 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-15-blue"
},

{
name:"iPhone 17e",
price:"44 700 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/iphone-14-midnight"
},

{
name:"AirPods Pro 2",
price:"14 000 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/MQD83"
},

{
name:"AirPods 4",
price:"8 800 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/MXK53"
},

{
name:"Apple Watch",
price:"25 900 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/watch-s9"
},

{
name:"MacBook Air",
price:"86 000 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/macbook-air"
},

{
name:"iPad Pro",
price:"89 200 ₽",
img:"https://store.storeimages.cdn-apple.com/4982/as-images.apple.com/is/ipad-pro"
}

]

function render(){
let html=""
products.forEach((p,i)=>{
html+=`
<div class="card" onclick="openModal(${i})">
<img src="${p.img}">
<div class="title">${p.name}</div>
<div class="price">${p.price}</div>
<button class="btn">Подробнее</button>
</div>`
})
document.getElementById("products").innerHTML=html
}

function openModal(i){
current=products[i].name
document.getElementById("modal").style.display="flex"
document.getElementById("mImg").src=products[i].img
document.getElementById("mName").innerText=products[i].name
document.getElementById("mPrice").innerText=products[i].price
}

function buy(){
window.open("https://t.me/iDeal_Point_Level?text=Хочу "+current)
}

window.onclick=e=>{
if(e.target.id==="modal") document.getElementById("modal").style.display="none"
}

render()

</script>

</body>
</html>
